<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Executions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .navbar {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            color: #333;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #667eea;
            font-weight: 600;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f5f7fa;
            border-bottom: 2px solid #e0e0e0;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            font-size: 13px;
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            color: #555;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .status-running {
            background: #fff3cd;
            color: #856404;
        }

        .btn-view {
            display: inline-block;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-view:hover {
            background: #5568d3;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            color: #555;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .header {
                flex-direction: column;
                gap: 15px;
            }

            table {
                font-size: 13px;
            }

            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>⚙️ Workflow Management System</h1>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/designer">Designer</a>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>📊 Workflow Executions</h1>
        </div>

        <div class="table-wrapper">
            <table id="executionTable">
                <thead>
                    <tr>
                        <th>Execution ID</th>
                        <th>Workflow</th>
                        <th>Status</th>
                        <th>Started</th>
                        <th>Completed</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" style="text-align: center; padding: 40px;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadExecutions() {
            try {
                const response = await fetch('/api/executions');
                const executions = await response.json();

                const tableBody = document.getElementById('tableBody');
                
                if (!executions || executions.length === 0) {
                    tableBody.innerHTML = `
                        <tr>
                            <td colspan="6">
                                <div class="empty-state">
                                    <div class="empty-state-icon">📭</div>
                                    <h2>No Executions Found</h2>
                                    <p>No workflows have been executed yet. <a href="/designer" style="color: #667eea; text-decoration: underline;">Execute one now</a></p>
                                </div>
                            </td>
                        </tr>
                    `;
                    return;
                }

                tableBody.innerHTML = executions.map(exec => {
                    const statusClass = `status-${exec.status.toLowerCase()}`;
                    const shortId = exec.id.substring(0, 8) + '...';
                    
                    const started = new Date(exec.started_at).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    const completed = exec.completed_at ? new Date(exec.completed_at).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    }) : '-';

                    return `
                        <tr>
                            <td><code style="background: #f0f0f0; padding: 4px 8px; border-radius: 4px; font-size: 12px;">${shortId}</code></td>
                            <td><strong>${exec.workflow_name}</strong></td>
                            <td><span class="status-badge ${statusClass}">${exec.status.toUpperCase()}</span></td>
                            <td>${started}</td>
                            <td>${completed}</td>
                            <td><a href="/execution/${exec.id}" class="btn-view">View Details</a></td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                const tableBody = document.getElementById('tableBody');
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align: center; color: #d32f2f; padding: 40px;">
                            Error loading executions: ${error.message}
                        </td>
                    </tr>
                `;
            }
        }

        loadExecutions();
    </script>
</body>
</html>
