<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Details - Approval Workflow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
        }

        .btn-back {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
            margin-bottom: 20px;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .detail-item {
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }

        .detail-item label {
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 5px;
            display: block;
        }

        .detail-item value {
            color: #333;
            font-size: 16px;
            font-weight: 600;
            display: block;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-approved {
            background: #d4edda;
            color: #155724;
        }

        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .approval-timeline {
            position: relative;
            padding: 20px 0;
        }

        .timeline-item {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            position: relative;
        }

        .timeline-item:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 16px;
            top: 50px;
            width: 2px;
            height: 30px;
            background: #e0e0e0;
        }

        .timeline-marker {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
            font-size: 16px;
        }

        .timeline-marker.approved {
            background: #4CAF50;
        }

        .timeline-marker.rejected {
            background: #f44336;
        }

        .timeline-marker.pending {
            background: #ff9800;
        }

        .timeline-content {
            flex: 1;
        }

        .timeline-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .timeline-decision {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        .timeline-comment {
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
            font-size: 12px;
            color: #555;
            margin-top: 8px;
        }

        .timeline-date {
            font-size: 11px;
            color: #999;
            margin-top: 8px;
        }

        .no-approvals {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .no-approvals p {
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .detail-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 Expense Details</h1>
            <a href="/history" class="btn-back">← Back to History</a>
        </div>

        <div class="card" id="expenseCard">
            <h2>💳 Expense Information</h2>
            <div class="detail-grid" id="expenseDetails">
                <div class="detail">Loading...</div>
            </div>
        </div>

        <div class="card">
            <h2>🔄 Approval Workflow Timeline</h2>
            <div class="approval-timeline" id="approvalTimeline">
                <div style="text-align: center; padding: 40px; color: #999;">Loading approval history...</div>
            </div>
        </div>
    </div>

    <script>
        const expenseId = window.location.pathname.split('/').pop();

        async function loadExpenseDetails() {
            try {
                const response = await fetch(`/api/expense/${expenseId}`);
                if (!response.ok) {
                    throw new Error('Expense not found');
                }

                const data = await response.json();
                const expense = data.expense;
                const approvals = data.approvals;

                // Display expense details
                const detailsHTML = `
                    <div class="detail-item">
                        <label>Expense ID</label>
                        <value>#${expense.id}</value>
                    </div>
                    <div class="detail-item">
                        <label>Amount</label>
                        <value>$${parseFloat(expense.amount).toFixed(2)}</value>
                    </div>
                    <div class="detail-item">
                        <label>Department</label>
                        <value>${expense.department}</value>
                    </div>
                    <div class="detail-item">
                        <label>Country</label>
                        <value>${expense.country}</value>
                    </div>
                    <div class="detail-item">
                        <label>Priority</label>
                        <value>${expense.priority}</value>
                    </div>
                    <div class="detail-item">
                        <label>Status</label>
                        <span class="status-badge status-${expense.status.toLowerCase()}">${expense.status}</span>
                    </div>
                    <div class="detail-item">
                        <label>Submitted By</label>
                        <value>${expense.submitted_by}</value>
                    </div>
                    <div class="detail-item">
                        <label>Submitted Date</label>
                        <value>${new Date(expense.created_at).toLocaleDateString('en-US', { 
                            year: 'numeric',
                            month: 'long',
                            day: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        })}</value>
                    </div>
                `;

                if (expense.description) {
                    detailsHTML += `
                        <div class="detail-item">
                            <label>Description</label>
                            <value>${expense.description}</value>
                        </div>
                    `;
                }

                document.getElementById('expenseDetails').innerHTML = detailsHTML;

                // Display approval timeline
                if (approvals && approvals.length > 0) {
                    const timelineHTML = approvals.map((approval, index) => {
                        const markerClass = approval.decision.toLowerCase();
                        const date = new Date(approval.decided_at).toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'short',
                            day: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        });

                        const iconMap = {
                            'approved': '✓',
                            'rejected': '✗',
                            'pending': '⏳'
                        };

                        return `
                            <div class="timeline-item">
                                <div class="timeline-marker ${markerClass}">
                                    ${iconMap[markerClass]}
                                </div>
                                <div class="timeline-content">
                                    <div class="timeline-title">Step ${index + 1}: ${approval.approver_level} Review</div>
                                    <div class="timeline-decision">
                                        Decision: <strong>${approval.decision}</strong>
                                    </div>
                                    ${approval.comments ? `
                                        <div class="timeline-comment">
                                            💬 ${approval.comments}
                                        </div>
                                    ` : ''}
                                    <div class="timeline-date">
                                        📅 ${date}
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');

                    document.getElementById('approvalTimeline').innerHTML = timelineHTML;
                } else {
                    document.getElementById('approvalTimeline').innerHTML = `
                        <div class="no-approvals">
                            <p>No approval records found. If amount ≤ $200, it was auto-approved.</p>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('expenseDetails').innerHTML = `
                    <div style="color: #d32f2f; padding: 20px;">
                        Error: ${error.message}
                    </div>
                `;
                document.getElementById('approvalTimeline').innerHTML = `
                    <div style="color: #d32f2f; padding: 20px; text-align: center;">
                        Unable to load approval timeline
                    </div>
                `;
            }
        }

        loadExpenseDetails();
    </script>
</body>
</html>
