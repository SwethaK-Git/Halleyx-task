<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow Designer - Workflow Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .navbar {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar h1 {
            color: #333;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #667eea;
            font-weight: 600;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .form-section {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background: #f7f9ff;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .steps-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .step-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            position: relative;
            transition: all 0.3s;
        }

        .step-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .step-card h4 {
            color: #333;
            margin-bottom: 10px;
        }

        .step-type {
            display: inline-block;
            padding: 4px 12px;
            background: #e8eaf6;
            color: #667eea;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            background: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-small:hover {
            background: #e0e0e0;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .steps-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>⚙️ Workflow Management System</h1>
        <div class="nav-links">
            <a href="/">← Home</a>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🛠️ Workflow Designer</h1>
        </div>

        <div id="alert" class="alert"></div>

        <div class="form-section">
            <h3>Expense Approval Workflow - Execute</h3>
            <p style="color: #666; margin-bottom: 20px;">This is the pre-built expense approval workflow with manager approval, finance notification, CEO approval, and task completion steps.</p>
            
            <form id="executeForm">
                <div class="form-group">
                    <label>Amount ($)*</label>
                    <input type="number" id="amount" name="amount" required min="1" step="0.01" placeholder="e.g., 5000">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Department*</label>
                        <select id="department" name="department" required>
                            <option value="">Select Department</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Finance">Finance</option>
                            <option value="HR">Human Resources</option>
                            <option value="Marketing">Marketing</option>
                            <option value="Sales">Sales</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Status*</label>
                        <select id="status" name="status" required>
                            <option value="">Select Status</option>
                            <option value="New">New</option>
                            <option value="Pending">Pending</option>
                            <option value="Approved">Approved</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" name="description" placeholder="Brief description of the expense..."></textarea>
                </div>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Executing workflow...</p>
                </div>

                <button type="submit" class="btn btn-primary" id="executeBtn">▶️ Execute Workflow</button>
            </form>
        </div>

        <div id="result" style="display: none; background: #f9f9f9; padding: 20px; border-radius: 8px; border-left: 4px solid #667eea;">
            <h3>Execution Result</h3>
            <div id="resultContent" style="margin-top: 15px;"></div>
        </div>
    </div>

    <script>
        const form = document.getElementById('executeForm');
        const alert_box = document.getElementById('alert');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');

        function showAlert(message, type) {
            alert_box.textContent = message;
            alert_box.className = `alert alert-${type}`;
            alert_box.style.display = 'block';
            setTimeout(() => {
                alert_box.style.display = 'none';
            }, 5000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                amount: parseFloat(document.getElementById('amount').value),
                department: document.getElementById('department').value,
                status: document.getElementById('status').value,
                description: document.getElementById('description').value
            };

            loading.style.display = 'block';
            result.style.display = 'none';

            try {
                // First get the default workflow
                const workflowRes = await fetch('/api/default-workflow');
                const workflowData = await workflowRes.json();

                // Execute the workflow
                const executeRes = await fetch('/api/workflow/execute', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        workflow_id: workflowData.id,
                        input_data: formData
                    })
                });

                const response = await executeRes.json();
                loading.style.display = 'none';

                if (executeRes.ok) {
                    showAlert(`✅ Workflow executed successfully!`, 'success');
                    
                    const resultHtml = `
                        <div style="display: grid; gap: 15px;">
                            <div style="padding: 15px; background: white; border-radius: 6px;">
                                <strong>Execution ID:</strong> ${response.execution_id}
                            </div>
                            <div style="padding: 15px; background: white; border-radius: 6px;">
                                <strong>Status:</strong> <span style="color: #4CAF50; font-weight: bold;">${response.status}</span>
                            </div>
                            <div style="padding: 15px; background: white; border-radius: 6px;">
                                <strong>Steps Executed:</strong> ${response.steps_executed}
                            </div>
                            <div style="padding: 15px; background: white; border-radius: 6px;">
                                <strong>Amount:</strong> $${formData.amount}
                            </div>
                            <div style="padding: 15px; background: white; border-radius: 6px;">
                                <strong>Department:</strong> ${formData.department}
                            </div>
                            <a href="/execution/${response.execution_id}" style="padding: 12px 24px; background: #667eea; color: white; text-decoration: none; border-radius: 6px; text-align: center; font-weight: 600;">View Full Details</a>
                        </div>
                    `;
                    
                    document.getElementById('resultContent').innerHTML = resultHtml;
                    result.style.display = 'block';
                    form.reset();
                } else {
                    showAlert(`❌ Error: ${response.error}`, 'error');
                }
            } catch (error) {
                loading.style.display = 'none';
                showAlert(`❌ Error: ${error.message}`, 'error');
            }
        });
    </script>
</body>
</html>
