<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense History - Approval Workflow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .btn-back {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .table-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f5f7fa;
            border-bottom: 2px solid #e0e0e0;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            font-size: 13px;
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            color: #555;
        }

        tbody tr:hover {
            background: #f9f9f9;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-approved {
            background: #d4edda;
            color: #155724;
        }

        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .priority-high {
            color: #d32f2f;
            font-weight: 600;
        }

        .priority-medium {
            color: #f57c00;
            font-weight: 600;
        }

        .priority-low {
            color: #388e3c;
            font-weight: 600;
        }

        .btn-view {
            display: inline-block;
            padding: 6px 12px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 12px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-view:hover {
            background: #5568d3;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            color: #555;
            margin-bottom: 10px;
        }

        .amount {
            font-weight: 600;
            color: #333;
        }

        @media (max-width: 768px) {
            table {
                font-size: 13px;
            }

            th, td {
                padding: 10px;
            }

            .table-wrapper {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Expense Submission History</h1>
            <p>View all submitted expenses and their approval status</p>
            <a href="/" class="btn-back">← Back to Form</a>
        </div>

        <div class="table-wrapper">
            <table id="expenseTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Amount</th>
                        <th>Department</th>
                        <th>Country</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Submitted By</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="9" style="text-align: center; padding: 40px;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadExpenses() {
            try {
                const response = await fetch('/api/expenses');
                const expenses = await response.json();

                const tableBody = document.getElementById('tableBody');
                
                if (!expenses || expenses.length === 0) {
                    tableBody.innerHTML = `
                        <tr>
                            <td colspan="9">
                                <div class="empty-state">
                                    <div class="empty-state-icon">📭</div>
                                    <h2>No Expenses Found</h2>
                                    <p>No expenses have been submitted yet. <a href="/" style="color: #667eea; text-decoration: underline;">Submit one now</a></p>
                                </div>
                            </td>
                        </tr>
                    `;
                    return;
                }

                tableBody.innerHTML = expenses.map(exp => {
                    const date = new Date(exp.created_at).toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    });

                    const statusClass = `status-${exp.status.toLowerCase()}`;
                    const priorityClass = `priority-${exp.priority.toLowerCase()}`;

                    return `
                        <tr>
                            <td><strong>#${exp.id}</strong></td>
                            <td><span class="amount">$${parseFloat(exp.amount).toFixed(2)}</span></td>
                            <td>${exp.department}</td>
                            <td>${exp.country}</td>
                            <td><span class="${priorityClass}">${exp.priority}</span></td>
                            <td><span class="status-badge ${statusClass}">${exp.status}</span></td>
                            <td>${exp.submitted_by}</td>
                            <td>${date}</td>
                            <td><a href="/expense/${exp.id}" class="btn-view">View Details</a></td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                const tableBody = document.getElementById('tableBody');
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="9" style="text-align: center; color: #d32f2f; padding: 40px;">
                            Error loading expenses: ${error.message}
                        </td>
                    </tr>
                `;
            }
        }

        // Load expenses when page loads
        loadExpenses();
    </script>
</body>
</html>
